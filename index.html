<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0015">
<title>✨ Magic Hands ✨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a0015; overflow: hidden; touch-action: none; font-family: sans-serif; }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #video { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; }
  #score-badge {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 40px;
    padding: 8px 24px; color: white; font-size: 1.1rem; z-index: 5;
    pointer-events: none; text-shadow: 0 0 12px #ffaaff; white-space: nowrap;
  }
  #debug {
    position: absolute; bottom: 24px; left: 12px;
    color: #ff88cc; font-size: 0.85rem; z-index: 10; pointer-events: none;
  }
  #loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: white;
    font-size: 1.2rem; gap: 14px; z-index: 10; background: #0a0015;
    transition: opacity 0.8s; text-align: center; padding: 24px;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #status { font-size: 0.9rem; color: #ff88cc; max-width: 300px; line-height: 1.5; }
  .spinner { width: 52px; height: 52px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #ff88cc; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<video id="video" playsinline autoplay muted></video>
<div id="score-badge">✨ <span id="score">0</span> sparks!</div>
<div id="debug">Loading...</div>
<div id="loading">
  <div class="spinner"></div>
  <div>Loading magic... 🌸</div>
  <div id="status">Starting...</div>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const loading  = document.getElementById('loading');
const statusEl = document.getElementById('status');
const scoreEl  = document.getElementById('score');
const debugEl  = document.getElementById('debug');

let W, H, totalSpawned = 0;
const particles = [];
let handPoints  = [];  // only populated when real detection fires

const log = msg => debugEl.textContent = msg;
const setStatus = msg => { statusEl.textContent = msg; log(msg); };

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── video cover-fit mirrored ──────────────────────────────────────────
function drawVideo() {
  if (video.readyState < 2) return;
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return;
  const scale = Math.max(W/vw, H/vh);
  const dw = vw*scale, dh = vh*scale;
  const ox = (W-dw)/2, oy = (H-dh)/2;
  ctx.save();
  ctx.globalAlpha = 0.45;
  ctx.translate(W, 0); ctx.scale(-1, 1);
  // when mirrored, ox flips: left edge becomes W - ox - dw
  ctx.drawImage(video, -(ox + dw - W), oy, dw, dh);
  ctx.restore();
}

// ── PARTICLES ────────────────────────────────────────────────────────
const TYPES = ['flower','flower','flower','butterfly','butterfly','flower'];
const PAL = {
  flower:    ['#ff6eb4','#ff9de2','#ffb347','#ff6b6b','#c084fc','#f9a8d4'],
  spark:     ['#ffe066','#ff9900','#fff','#ff6600','#ffcc00','#ffd700'],
  butterfly: ['#67e8f9','#a5f3fc','#f0abfc','#e879f9','#fbbf24','#34d399'],
  firefly:   ['#d9f99d','#bbf7d0','#6ee7b7','#fff','#fef08a','#86efac'],
  leaf:      ['#86efac','#4ade80','#bbf7d0','#fbbf24','#fb923c','#f87171'],
  star:      ['#e0f2fe','#bae6fd','#fff','#f0abfc','#fde68a','#fca5a5'],
};
const pick = a => a[Math.floor(Math.random()*a.length)];
const rand = (a,b) => a + Math.random()*(b-a);

class Particle {
  constructor(x,y) {
    this.type=pick(TYPES); this.x=x+rand(-20,20); this.y=y+rand(-20,20);
    this.color=pick(PAL[this.type]); this.color2=pick(PAL[this.type]);
    this.size=rand(14,26); this.life=1; this.decay=rand(0.003,0.007);
    this.vx=rand(-3,3); this.vy=rand(-1.5,-0.2); this.gravity=rand(0.008,0.025);
    this.rot=rand(0,Math.PI*2); this.rotSpeed=rand(-0.09,0.09);
    this.wobble=rand(0,Math.PI*2); this.wobbleSpeed=rand(0.04,0.11); this.wobbleAmp=rand(0.5,3);
    this.flap=rand(0,Math.PI*2); this.flapSpeed=rand(0.1,0.28);
    this.pulse=rand(0,Math.PI*2); this.pulseSpeed=rand(0.06,0.15);
  }
  update() {
    this.life-=this.decay; this.vy+=this.gravity; this.wobble+=this.wobbleSpeed;
    this.x+=this.vx+Math.sin(this.wobble)*this.wobbleAmp; this.y+=this.vy;
    this.rot+=this.rotSpeed; this.flap+=this.flapSpeed; this.pulse+=this.pulseSpeed;
  }
  draw() {
    if(this.life<=0) return;
    const s=this.size;
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, this.life));
    ctx.translate(this.x, this.y); ctx.rotate(this.rot);
    switch(this.type) {
      case 'flower': {
        // outer glow
        const fg=ctx.createRadialGradient(0,0,0,0,0,s*1.4);
        fg.addColorStop(0,this.color+'44'); fg.addColorStop(1,this.color+'00');
        ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(0,0,s*1.4,0,Math.PI*2); ctx.fill();
        // 6 petals with gradient
        for(let i=0;i<6;i++){
          ctx.save(); ctx.rotate(Math.PI*2/6*i);
          const pg=ctx.createRadialGradient(0,-s*.5,0,0,-s*.5,s*.55);
          pg.addColorStop(0,'#fff'); pg.addColorStop(0.3,this.color); pg.addColorStop(1,this.color2+'aa');
          ctx.fillStyle=pg;
          ctx.beginPath(); ctx.ellipse(0,-s*.52,s*.28,s*.5,0,0,Math.PI*2); ctx.fill();
          ctx.restore();
        }
        // center circle
        const cg=ctx.createRadialGradient(0,0,0,0,0,s*.32);
        cg.addColorStop(0,'#fffde0'); cg.addColorStop(1,'#fbbf24');
        ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(0,0,s*.32,0,Math.PI*2); ctx.fill();
        // stamen dots
        for(let i=0;i<6;i++){
          const a=Math.PI*2/6*i;
          ctx.fillStyle='#f59e0b';
          ctx.beginPath(); ctx.arc(Math.cos(a)*s*.18,Math.sin(a)*s*.18,s*.06,0,Math.PI*2); ctx.fill();
        }
        break;
      }
      case 'spark': {
        ctx.strokeStyle=this.color;ctx.lineWidth=s*.12;ctx.lineCap='round';
        for(let i=0;i<8;i++){ctx.save();ctx.rotate(Math.PI/4*i);ctx.beginPath();ctx.moveTo(0,s*.15);ctx.lineTo(0,s*.7);ctx.stroke();ctx.restore();}
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,s*.2,0,Math.PI*2);ctx.fill();
        break;
      }
      case 'butterfly': {
        const f = Math.abs(Math.cos(this.flap));
        ctx.save(); ctx.scale(f, 1);
        // upper wings with gradient
        const bgl = ctx.createRadialGradient(-s*.4,-s*.25,0,-s*.4,-s*.25,s*.55);
        bgl.addColorStop(0,'#fff'); bgl.addColorStop(0.4,this.color); bgl.addColorStop(1,this.color+'66');
        ctx.fillStyle=bgl; ctx.beginPath(); ctx.ellipse(-s*.42,-s*.22,s*.52,s*.38,-0.35,0,Math.PI*2); ctx.fill();
        const bgr = ctx.createRadialGradient(s*.4,-s*.25,0,s*.4,-s*.25,s*.55);
        bgr.addColorStop(0,'#fff'); bgr.addColorStop(0.4,this.color2); bgr.addColorStop(1,this.color2+'66');
        ctx.fillStyle=bgr; ctx.beginPath(); ctx.ellipse(s*.42,-s*.22,s*.52,s*.38,0.35,0,Math.PI*2); ctx.fill();
        // lower wings
        const bll = ctx.createRadialGradient(-s*.28,s*.28,0,-s*.28,s*.28,s*.32);
        bll.addColorStop(0,this.color2); bll.addColorStop(1,this.color+'44');
        ctx.fillStyle=bll; ctx.beginPath(); ctx.ellipse(-s*.28,s*.28,s*.32,s*.24,0.4,0,Math.PI*2); ctx.fill();
        const blr = ctx.createRadialGradient(s*.28,s*.28,0,s*.28,s*.28,s*.32);
        blr.addColorStop(0,this.color); blr.addColorStop(1,this.color2+'44');
        ctx.fillStyle=blr; ctx.beginPath(); ctx.ellipse(s*.28,s*.28,s*.32,s*.24,-0.4,0,Math.PI*2); ctx.fill();
        // wing shimmer dots
        ctx.fillStyle='rgba(255,255,255,0.6)';
        ctx.beginPath(); ctx.arc(-s*.38,-s*.28,s*.07,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*.38,-s*.28,s*.07,0,Math.PI*2); ctx.fill();
        ctx.restore();
        // body
        const bodyG = ctx.createLinearGradient(0,-s*.4,0,s*.4);
        bodyG.addColorStop(0,'#3b1f6e'); bodyG.addColorStop(1,'#1a0a2e');
        ctx.fillStyle=bodyG; ctx.beginPath(); ctx.ellipse(0,0,s*.07,s*.42,0,0,Math.PI*2); ctx.fill();
        // antennae
        ctx.strokeStyle='#6b3fa0'; ctx.lineWidth=s*.04; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(0,-s*.38); ctx.quadraticCurveTo(-s*.18,-s*.65,-s*.22,-s*.72); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,-s*.38); ctx.quadraticCurveTo(s*.18,-s*.65,s*.22,-s*.72); ctx.stroke();
        ctx.fillStyle='#c084fc';
        ctx.beginPath(); ctx.arc(-s*.22,-s*.72,s*.06,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(s*.22,-s*.72,s*.06,0,Math.PI*2); ctx.fill();
        break;
      }
      case 'firefly': {
        const glow=0.5+0.5*Math.sin(this.pulse);
        ctx.fillStyle=this.color;ctx.globalAlpha*=(0.5+glow*0.5);
        ctx.beginPath();ctx.arc(0,0,s*(0.6+glow*0.4),0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.globalAlpha=1;ctx.beginPath();ctx.arc(0,0,s*.12,0,Math.PI*2);ctx.fill();
        break;
      }
      case 'leaf': {
        ctx.fillStyle=this.color;ctx.beginPath();
        ctx.moveTo(0,-s*.7);ctx.bezierCurveTo(s*.5,-s*.4,s*.5,s*.4,0,s*.7);
        ctx.bezierCurveTo(-s*.5,s*.4,-s*.5,-s*.4,0,-s*.7);ctx.fill();
        break;
      }
      case 'star': {
        ctx.fillStyle=this.color;ctx.beginPath();
        for(let i=0;i<10;i++){const r2=i%2===0?s*.7:s*.3;const a=Math.PI/5*i-Math.PI/2;i===0?ctx.moveTo(Math.cos(a)*r2,Math.sin(a)*r2):ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);}
        ctx.closePath();ctx.fill();
        break;
      }
    }
    ctx.restore();
  }
}

function spawnAt(x, y, n=2) {
  if(particles.length >= 25) return;
  for(let i=0;i<n;i++) particles.push(new Particle(x,y));
  totalSpawned += n;
  scoreEl.textContent = totalSpawned;
}

// ── RENDER LOOP ───────────────────────────────────────────────────────
function renderLoop() {
  requestAnimationFrame(renderLoop);

  // FULL clear every frame — no ghosting
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0015';
  ctx.fillRect(0, 0, W, H);

  // video feed
  drawVideo();

  // dark tint over video so particles pop
  ctx.fillStyle = 'rgba(10,0,21,0.3)';
  ctx.fillRect(0, 0, W, H);

  // spawn + glow only when hands detected
  if (handPoints.length > 0) {
    for(const pt of handPoints) {
      if(Math.random() < 0.022) spawnAt(pt.x*W, pt.y*H, 1);
    }
    // draw glow at fingertips only (landmarks 4,8,12,16,20 = fingertips)
    // handPoints has all 21 per hand; fingertips are every 21*hand + [4,8,12,16,20]
    for(let i=0;i<handPoints.length;i++) {
      const localIdx = i % 21;
      if([4,8,12,16,20].includes(localIdx)) {
        const pt = handPoints[i];
        const g = ctx.createRadialGradient(pt.x*W,pt.y*H,0,pt.x*W,pt.y*H,28);
        g.addColorStop(0,'rgba(255,180,255,0.8)');
        g.addColorStop(1,'rgba(255,180,255,0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(pt.x*W,pt.y*H,28,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // draw + age particles
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.update(); p.draw();
    if(p.life<=0 || p.y>H+80) particles.splice(i,1);
  }
}
requestAnimationFrame(renderLoop);

// ── MEDIAPIPE ─────────────────────────────────────────────────────────
let handLandmarker, lastVideoTime = -1;

async function init() {
  try {
    setStatus('Loading AI model...');
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );

    setStatus('Building hand tracker...');
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "CPU"
      },
      runningMode: "VIDEO",
      numHands: 2,
      minHandDetectionConfidence: 0.4,
      minHandPresenceConfidence: 0.4,
      minTrackingConfidence: 0.4,
    });

    setStatus('Starting camera...');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:640}, height:{ideal:480} },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(res => { video.onloadedmetadata = res; });
    await video.play();

    setStatus('✨ Show your hands!');
    setTimeout(() => loading.classList.add('hidden'), 800);
    detectLoop();

  } catch(e) {
    setStatus('❌ ' + e.message);
    console.error(e);
  }
}

function detectLoop() {
  requestAnimationFrame(detectLoop);
  if(!handLandmarker || video.readyState < 2) return;
  if(video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;

  try {
    const results = handLandmarker.detectForVideo(video, performance.now());
    handPoints = [];
    if(results?.landmarks?.length) {
      for(const hand of results.landmarks)
        for(const lm of hand) handPoints.push({x: 1-lm.x, y: lm.y});
      log(`👋 ${results.landmarks.length} hand(s)`);
    } else {
      log('✋ Show your hands!');
    }
  } catch(e) {
    log('err: '+e.message);
  }
}

init();
</script>
</body>
</html>
