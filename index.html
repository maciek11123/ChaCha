<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0015">
<title>✨ Magic Hands ✨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a0015; overflow: hidden; touch-action: none; font-family: sans-serif; }
  #canvas { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
  #video { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; }
  #score-badge {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 40px;
    padding: 8px 24px; color: white; font-size: 1.1rem; z-index: 5;
    pointer-events: none; text-shadow: 0 0 12px #ffaaff;
  }
  #debug {
    position: absolute; bottom: 24px; left: 12px; right: 12px;
    color: #ff88cc; font-size: 0.8rem; z-index: 10;
    line-height: 1.6; pointer-events: none;
  }
  #loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: white;
    font-size: 1.2rem; gap: 14px; z-index: 10; background: #0a0015;
    transition: opacity 0.8s; text-align: center; padding: 24px;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #status { font-size: 0.9rem; color: #ff88cc; max-width: 300px; line-height: 1.5; }
  .spinner { width: 52px; height: 52px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #ff88cc; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<video id="video" playsinline autoplay muted></video>
<div id="score-badge">✨ <span id="score">0</span> sparks!</div>
<div id="debug"></div>
<div id="loading">
  <div class="spinner"></div>
  <div>Loading magic... 🌸</div>
  <div id="status">Starting...</div>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const loading = document.getElementById('loading');
const statusEl= document.getElementById('status');
const scoreEl = document.getElementById('score');
const debugEl = document.getElementById('debug');

let W, H, totalSpawned = 0;
const particles = [], handPoints = [];

function log(msg) { debugEl.textContent = msg; console.log(msg); }
function setStatus(msg) { statusEl.textContent = msg; log(msg); }

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── PARTICLES ────────────────────────────────────────────────────────
const TYPES = ['flower','spark','butterfly','firefly','leaf','star'];
const PALETTES = {
  flower:    ['#ff6eb4','#ff9de2','#ffb347','#ff6b6b','#c084fc','#f9a8d4'],
  spark:     ['#ffe066','#ff9900','#fff','#ff6600','#ffcc00','#ffd700'],
  butterfly: ['#67e8f9','#a5f3fc','#f0abfc','#e879f9','#fbbf24','#34d399'],
  firefly:   ['#d9f99d','#bbf7d0','#6ee7b7','#fff','#fef08a','#86efac'],
  leaf:      ['#86efac','#4ade80','#bbf7d0','#fbbf24','#fb923c','#f87171'],
  star:      ['#e0f2fe','#bae6fd','#fff','#f0abfc','#fde68a','#fca5a5'],
};
const pick = a => a[Math.floor(Math.random()*a.length)];
const rand = (a,b) => a+Math.random()*(b-a);

class Particle {
  constructor(x,y) {
    this.type=pick(TYPES); this.x=x+rand(-18,18); this.y=y+rand(-18,18);
    this.color=pick(PALETTES[this.type]); this.color2=pick(PALETTES[this.type]);
    this.size=rand(10,28); this.life=1; this.decay=rand(0.008,0.022);
    this.vx=rand(-2.5,2.5); this.vy=rand(-4,-1); this.gravity=rand(0.04,0.12);
    this.rot=rand(0,Math.PI*2); this.rotSpeed=rand(-0.08,0.08);
    this.wobble=rand(0,Math.PI*2); this.wobbleSpeed=rand(0.04,0.1); this.wobbleAmp=rand(0.5,2.5);
    this.flap=0; this.flapSpeed=rand(0.12,0.25);
    this.pulse=rand(0,Math.PI*2); this.pulseSpeed=rand(0.06,0.14);
  }
  update() {
    this.life-=this.decay; this.vy+=this.gravity; this.wobble+=this.wobbleSpeed;
    this.x+=this.vx+Math.sin(this.wobble)*this.wobbleAmp; this.y+=this.vy;
    this.rot+=this.rotSpeed; this.flap+=this.flapSpeed; this.pulse+=this.pulseSpeed;
  }
  draw() {
    if(this.life<=0) return;
    const s=this.size;
    ctx.save(); ctx.globalAlpha=Math.min(this.life,1)*Math.max(0,this.life);
    ctx.translate(this.x,this.y); ctx.rotate(this.rot);
    switch(this.type) {
      case 'flower': {
        const g=ctx.createRadialGradient(0,0,0,0,0,s*1.2);
        g.addColorStop(0,this.color+'cc'); g.addColorStop(1,this.color+'00');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,s*1.2,0,Math.PI*2); ctx.fill();
        for(let i=0;i<5;i++){ctx.save();ctx.rotate(Math.PI*2/5*i);ctx.fillStyle=this.color;ctx.beginPath();ctx.ellipse(0,-s*.6,s*.3,s*.55,0,0,Math.PI*2);ctx.fill();ctx.restore();}
        ctx.fillStyle='#fff9c4';ctx.beginPath();ctx.arc(0,0,s*.28,0,Math.PI*2);ctx.fill();
        break;
      }
      case 'spark': {
        const g=ctx.createRadialGradient(0,0,0,0,0,s*1.5);
        g.addColorStop(0,'#fff');g.addColorStop(0.3,this.color);g.addColorStop(1,this.color+'00');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,s*1.5,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle=this.color;ctx.lineWidth=s*.12;ctx.lineCap='round';
        for(let i=0;i<8;i++){ctx.save();ctx.rotate(Math.PI*2/8*i);ctx.beginPath();ctx.moveTo(0,s*.15);ctx.lineTo(0,s*.75);ctx.stroke();ctx.restore();}
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,s*.2,0,Math.PI*2);ctx.fill();
        break;
      }
      case 'butterfly': {
        const f=Math.abs(Math.cos(this.flap));
        ctx.save();ctx.scale(f,1);
        ctx.fillStyle=this.color;ctx.beginPath();ctx.ellipse(-s*.45,-s*.2,s*.5,s*.35,-0.4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=this.color2;ctx.beginPath();ctx.ellipse(s*.45,-s*.2,s*.5,s*.35,0.4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=this.color+'bb';
        ctx.beginPath();ctx.ellipse(-s*.3,s*.25,s*.3,s*.22,0.3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(s*.3,s*.25,s*.3,s*.22,-0.3,0,Math.PI*2);ctx.fill();
        ctx.restore();
        ctx.fillStyle='#2d1b4e';ctx.beginPath();ctx.ellipse(0,0,s*.08,s*.45,0,0,Math.PI*2);ctx.fill();
        break;
      }
      case 'firefly': {
        const glow=0.5+0.5*Math.sin(this.pulse);
        const r=s*(0.8+glow*0.5);
        const g=ctx.createRadialGradient(0,0,0,0,0,r);
        g.addColorStop(0,'#fff');g.addColorStop(0.3,this.color);g.addColorStop(1,this.color+'00');
        ctx.fillStyle=g;ctx.globalAlpha*=(0.6+glow*0.4);ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,s*.15,0,Math.PI*2);ctx.fill();
        break;
      }
      case 'leaf': {
        ctx.fillStyle=this.color;ctx.beginPath();
        ctx.moveTo(0,-s*.7);ctx.bezierCurveTo(s*.5,-s*.4,s*.5,s*.4,0,s*.7);
        ctx.bezierCurveTo(-s*.5,s*.4,-s*.5,-s*.4,0,-s*.7);ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(0,-s*.6);ctx.lineTo(0,s*.6);ctx.stroke();
        break;
      }
      case 'star': {
        const g=ctx.createRadialGradient(0,0,0,0,0,s);
        g.addColorStop(0,this.color+'ff');g.addColorStop(1,this.color+'00');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=this.color;ctx.beginPath();
        for(let i=0;i<10;i++){const r2=i%2===0?s*.7:s*.3;const a=Math.PI/5*i-Math.PI/2;i===0?ctx.moveTo(Math.cos(a)*r2,Math.sin(a)*r2):ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);}
        ctx.closePath();ctx.fill();
        break;
      }
    }
    ctx.restore();
  }
}

function spawnAt(x,y,n=2) {
  if(particles.length>=350) return;
  for(let i=0;i<n;i++) particles.push(new Particle(x,y));
  totalSpawned+=n; scoreEl.textContent=totalSpawned;
}

// ── RENDER LOOP ───────────────────────────────────────────────────────
function renderLoop() {
  requestAnimationFrame(renderLoop);

  // draw dark bg
  ctx.fillStyle='rgba(10,0,21,0.35)';
  ctx.fillRect(0,0,W,H);

  // draw video frame onto canvas (dimmed, mirrored)
  if(video.readyState>=2) {
    ctx.save();
    ctx.globalAlpha=0.35;
    ctx.translate(W,0); ctx.scale(-1,1);
    ctx.drawImage(video,0,0,W,H);
    ctx.restore();
  }

  // glow + spawn at hand points
  for(const pt of handPoints) {
    if(Math.random()<0.55) spawnAt(pt.x*W,pt.y*H,2);
    const g=ctx.createRadialGradient(pt.x*W,pt.y*H,0,pt.x*W,pt.y*H,30);
    g.addColorStop(0,'rgba(255,200,255,0.6)');g.addColorStop(1,'rgba(255,200,255,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(pt.x*W,pt.y*H,30,0,Math.PI*2);ctx.fill();
  }

  // particles
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.update(); p.draw();
    if(p.life<=0||p.y>H+60) particles.splice(i,1);
  }
}
requestAnimationFrame(renderLoop);

// ── MEDIAPIPE ─────────────────────────────────────────────────────────
let handLandmarker, lastVideoTime=-1;

async function init() {
  try {
    setStatus('Loading AI model...');
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    setStatus('Building hand tracker...');
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 2,
      minHandDetectionConfidence: 0.5,
      minHandPresenceConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });

    setStatus('Requesting camera...');
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width:{ideal:640}, height:{ideal:480} },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play().then(() => {
        setStatus('Running! ✨');
        setTimeout(() => loading.classList.add('hidden'), 800);
        detectLoop();
      }).catch(e => setStatus('Play failed: '+e.message));
    };
  } catch(e) {
    setStatus('❌ ' + e.message);
    console.error(e);
  }
}

function detectLoop() {
  requestAnimationFrame(detectLoop);
  if(!handLandmarker || video.readyState<2 || video.currentTime===lastVideoTime) return;
  lastVideoTime = video.currentTime;
  const now = performance.now();
  const results = handLandmarker.detectForVideo(video, now);
  handPoints.length = 0;
  if(results.landmarks) {
    for(const hand of results.landmarks) {
      for(const lm of hand) handPoints.push({x:1-lm.x, y:lm.y});
    }
  }
  log(handPoints.length ? `👋 ${handPoints.length/21|0} hand(s) detected` : 'Move your hands!');
}

init();
</script>
</body>
</html>
